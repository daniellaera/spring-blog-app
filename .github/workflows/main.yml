name: Deploy Spring Boot App

on:
  push:
    branches: [ main ]  # Trigger on pushes to the main branch

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}  # Token for Fly.io

jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/jacoco.xml
            target/site/jacoco/index.html

      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.xml  # Path to JaCoCo report
          badges-directory: .github/badges                 # Directory to save badges
          generate-coverage-badge: true                     # Generate coverage badge
          generate-branches-badge: true                     # Generate branches badge
          coverage-label: "Coverage"                        # Label for coverage badge
          branches-label: "Branches"                        # Label for branches badge

      - name: Log coverage percentage
        run: |
          echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"

      - name: Commit and Push Badge
        uses: EndBug/add-and-commit@v7  # Update to the latest version
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: 'Update JaCoCo badge'
          add: .github/badges/*.svg
          token: ${{ secrets.GITHUB_TOKEN }}                # Use the GITHUB_TOKEN for pushing changes

  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Spring Boot App
        run: |
          flyctl deploy --remote-only