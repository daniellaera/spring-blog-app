name: Deploy Spring Boot App

on: [push]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'  # Specify Java version 21
          distribution: 'temurin'  # Using Temurin distribution
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean test  # Run your tests
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test  # This job depends on the test job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'  # Specify Java version 21
          distribution: 'temurin'  # Using Temurin distribution
          cache: maven

      - name: Generate JaCoCo Report
        run: mvn jacoco:report  # Generate the coverage report

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco/index.html  # Adjust this path if necessary
      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: build/reports/jacoco/jacoco.csv
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: coverage  # This job depends on the coverage job
    steps:
      - uses: actions/checkout@v3

      # Set up Flyctl
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Deploy Spring Boot Backend
      - name: Deploy Spring Boot App
        run: |
          flyctl deploy --remote-only