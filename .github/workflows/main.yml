name: Deploy Spring Boot App

on:
  push:
    branches: [ main ]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean test  # Ensure to clean and run tests

      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: target/site/jacoco/jacoco.csv  # Ensure this path is correct

      - name: Log coverage percentage
        run: |
          echo "Coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "Branch Coverage = ${{ steps.jacoco.outputs.branches }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          title: 'Update JaCoCo badge'
          body: 'This pull request updates the JaCoCo badge based on the latest coverage report.'
          base: main
          branch: create-pull-request/patch  # Use a descriptive branch name
          token: ${{ secrets.GITHUB_TOKEN }}  # Use the automatically generated token
          commit-message: '[create-pull-request] automated change'

  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1  # Specify the version tag for stability

      - name: Deploy Spring Boot App
        run: |
          flyctl deploy --remote-only