name: Deploy Spring Boot App

on: [push]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test, and Generate Coverage
        run: mvn clean verify

      - name: Check for JaCoCo XML Report
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "JaCoCo XML report found."
          else
            echo "JaCoCo XML report not found!"
            exit 1
          fi

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Parse JaCoCo Coverage
        id: parse-coverage
        run: |
          # Install xmlstarlet for XML parsing
          sudo apt-get update
          sudo apt-get install -y xmlstarlet
          
          # Extract coverage percentage
          COVERAGE=$(xmlstarlet sel -t -v "//report//line[@type='COMPLEXITY']/@covered" target/site/jacoco/jacoco.xml)
          TOTAL=$(xmlstarlet sel -t -v "//report//line[@type='COMPLEXITY']/@missed" target/site/jacoco/jacoco.xml)
          
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "No lines found in the report."
            exit 1
          fi

          # Calculate coverage percentage
          COVERAGE_PERCENTAGE=$((COVERAGE * 100 / (COVERAGE + TOTAL)))

          echo "Coverage Percentage: $COVERAGE_PERCENTAGE"
          echo "coverage=$COVERAGE_PERCENTAGE" >> $GITHUB_ENV

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Display Coverage Percentage
        run: |
          echo "JaCoCo coverage percentage: ${{ env.coverage }}%"

  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Spring Boot App
        run: |
          flyctl deploy --remote-only